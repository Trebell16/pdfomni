    <script>
      (function () {
        function apply(theme) {
          document.documentElement.dataset.theme = theme || 'light';
        }
        try {
          apply(localStorage.getItem('pdfomni_theme') || 'light');
        } catch (_) {
          apply('light');
        }
        window.addEventListener('message', function (event) {
          if (event.origin !== window.location.origin || !event.data || event.data.type !== 'pdfomni-theme') return;
          apply(event.data.theme);
        });
      })();
    </script>
