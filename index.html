<!DOCTYPE html>
<html lang="en">
  <head>
    <script>document.documentElement.classList.add('js-enabled');</script>
    <style>
      .app-boot {
        display: none;
      }
      .js-enabled .prerendered-seo {
        display: none !important;
      }
      .js-enabled .app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        visibility: hidden;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        animation: pdfomni-boot-reveal 0s linear 1200ms forwards;
      }
      .js-enabled[data-theme="dark"] .app-boot {
        background: #050817;
        color: #f8fafc;
      }
      .app-boot-inner {
        display: grid;
        justify-items: center;
        gap: 14px;
      }
      .app-boot-mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 10px;
        background: linear-gradient(135deg, #4f46e5, #a855f7 55%, #db2777);
        color: #fff;
        font-size: 26px;
        font-weight: 800;
      }
      .app-boot-name {
        font-size: 18px;
        font-weight: 800;
      }
      .app-boot-line {
        width: 112px;
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.12);
      }
      .app-boot-line::after {
        content: "";
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #4f46e5, #db2777);
        animation: pdfomni-boot 900ms ease-in-out infinite alternate;
      }
      @keyframes pdfomni-boot {
        from { transform: translateX(0); }
        to { transform: translateX(122%); }
      }
      @keyframes pdfomni-boot-reveal {
        to { visibility: visible; }
      }
    </style>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('pdfomni_theme');
          document.documentElement.dataset.theme = saved || 'light';
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TSWLYFYBM8');

      (function () {
        var loaded = false;
        function loadThirdPartyScripts() {
          if (loaded) return;
          loaded = true;

          var analytics = document.createElement('script');
          analytics.async = true;
          analytics.src = 'https://www.googletagmanager.com/gtag/js?id=G-TSWLYFYBM8';
          document.head.appendChild(analytics);

          var adsense = document.createElement('script');
          adsense.async = true;
          adsense.crossOrigin = 'anonymous';
          adsense.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5532127864022306';
          document.head.appendChild(adsense);
        }

        function scheduleThirdPartyScripts() {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadThirdPartyScripts, { timeout: 2500 });
          } else {
            window.setTimeout(loadThirdPartyScripts, 1200);
          }
        }

        if (document.readyState === 'complete') {
          scheduleThirdPartyScripts();
        } else {
          window.addEventListener('load', scheduleThirdPartyScripts, { once: true });
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PDFOmni — Free, private, 100% client-side PDF toolkit. Merge, split, compress, edit, convert and more. Your files never leave your browser." />
    <meta name="theme-color" content="#0a0a0f" />
    <title>PDFOmni — The Ultimate Client-Side PDF Toolkit</title>
    <link
      rel="preload"
      href="/fonts/inter-latin-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div class="app-boot" aria-hidden="true">
      <div class="app-boot-inner">
        <div class="app-boot-mark">P</div>
        <div class="app-boot-name">PDFOmni</div>
        <div class="app-boot-line"></div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
